name: Build and Release

on:
  push:
    tags:
      - 'v*' # 當有以 v 開頭的 tag 時啟動 (如 v1.0.1)

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller psutil pynput windows-capture opencv-python pytesseract PyQt6 pywin32

      - name: Run Build Script
        shell: powershell
        run: |
          # 執行你的 build.ps1
          ./build.ps1

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/ArtaleAgent.exe
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
