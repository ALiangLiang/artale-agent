name: Auto Tag and Release

on:
  push:
    branches:
      - main
    paths:
      - 'VERSION'
    tags:
      # 也支援手動推 tag 觸發
      - 'v*'

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_data.outputs.VERSION }}
      new_tag: ${{ steps.check_tag.outputs.exists == 'false' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Version and Message
        id: get_data
        run: |
          # Extract version string from 1st line
          VERSION=$(head -n 1 VERSION | tr -d '\r' | xargs)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          
          # Extract message from 2nd line onwards
          MESSAGE=$(tail -n +2 VERSION | tr -d '\r')
          if [ -z "$MESSAGE" ]; then 
            MESSAGE="Release $VERSION"
          fi
          
          # Use GITHUB_OUTPUT heredoc for multiline strings
          echo "MESSAGE<<EOF" >> $GITHUB_OUTPUT
          echo "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG=${{ steps.get_data.outputs.VERSION }}
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          TAG=${{ steps.get_data.outputs.VERSION }}
          MSG="${{ steps.get_data.outputs.MESSAGE }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$MSG"
          git push origin "$TAG"

  build:
    needs: tag
    # 只有在版本號改變且成功打標籤時，或是直接推 v 開頭的 tag 時執行
    if: |
      always() && 
      (needs.tag.outputs.new_tag == 'true' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # 如果是從 tag job 過來的，我們需要抓剛剛那個 tag
          ref: ${{ needs.tag.outputs.version || github.ref }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run Build Script
        shell: powershell
        run: |
          ./build.ps1

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ArtaleAgent.exe
          tag_name: ${{ needs.tag.outputs.version || github.ref_name }}
          name: Release ${{ needs.tag.outputs.version || github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
